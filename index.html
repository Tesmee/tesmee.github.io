<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<script>
function isPhone() {
    return window.innerWidth <= 768;
}

if (isPhone()) {
    window.location.replace("Version%202/phone.html");
} else {
    window.location.replace("Version%202/web.html");
}
</script>

</head>

</body>
</html>
